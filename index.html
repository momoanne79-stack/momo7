const STORE='surinamu_high_painting_v2';
const $=id=>document.getElementById(id);
const COW=[['🥚','알 단계'],['🐮','아기 소'],['🐄','튼튼한 소'],['🐂','멋진 소'],['👑🐂','전설의 소']];
function save(k,v){localStorage.setItem(STORE+k,JSON.stringify(v))}
function load(k,d){try{return JSON.parse(localStorage.getItem(STORE+k))??d}catch(e){return d}}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function norm(s){return String(s||'').toLowerCase().replace(/[“”"'`,.!?;:()—\-]/g,'').replace(/\s+/g,' ').trim()}
function conf(){if(window.confetti)confetti({particleCount:80,spread:70,origin:{y:.6}})}
function toast(m){const t=$('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove('show'),1300)}
function pct(done,total){return Math.round(done/Math.max(1,total)*100)}
function stage(p){return COW[p>=100?4:p>=75?3:p>=45?2:p>=20?1:0]}
function evo(kind,p,done,total){const s=stage(p);return `<div class="evo-card"><div class="evo-top"><div><div class="evo-name">${kind} 성장</div><div class="evo-sub">${done}/${total} 진행 · ${s[1]}</div></div><div class="evo-icon">${s[0]}</div></div><div class="progress" style="margin-top:10px"><div class="bar" style="width:${p}%"></div></div></div>`}
let selectedEnglishVoice=null;
function loadVoice(){const v=speechSynthesis.getVoices();selectedEnglishVoice=v.find(x=>x.lang==='en-US'&&/samantha|alex|ava|allison|google us/i.test(x.name))||v.find(x=>x.lang==='en-US')||v.find(x=>x.lang&&x.lang.startsWith('en'))||null}
if('speechSynthesis'in window){loadVoice();speechSynthesis.onvoiceschanged=loadVoice}
function stopSpeech(){try{speechSynthesis.cancel()}catch(e){}}
function speak(txt,rate=.78,onend){if(!('speechSynthesis'in window)){if(onend)onend();return}stopSpeech();let u=new SpeechSynthesisUtterance(txt);u.lang='en-US';u.rate=rate;u.pitch=1;if(selectedEnglishVoice)u.voice=selectedEnglishVoice;u.onend=()=>{if(onend)onend()};speechSynthesis.speak(u)}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.sec).classList.add('active');if(b.dataset.sec==='dict')setTimeout(startDictLoop,80);else stopDictLoop();if(b.dataset.sec==='record')renderRecord();if(b.dataset.sec==='wrong')renderWrong()});
function renderProblem(){let q=DATA.question;let nums=['①','②','③','④','⑤'];$('problemWrap').innerHTML=`<div class="bluecard"><b>${q.title}</b><br>${q.q}</div><div class="card">${DATA.passage.map((p,i)=>`<div class="passage-line"><b>${i+1}.</b> ${p[0]}<br><span class="sentence-small">${p[1]}</span></div>`).join('')}</div><div class="grid" id="popts">${q.options.map((o,i)=>`<button class="choice" data-i="${i}">${nums[i]} ${o}</button>`).join('')}</div><div id="presult"></div>`;document.querySelectorAll('#popts .choice').forEach(btn=>btn.onclick=()=>{let i=+btn.dataset.i;document.querySelectorAll('#popts .choice').forEach((x,j)=>{if(j===q.answer)x.classList.add('correct');else if(j===i)x.classList.add('wrong')});let ok=i===q.answer;save('_problem',{ok,answer:q.answer+1,time:new Date().toLocaleString('ko-KR')});$('presult').innerHTML=`<div class="bluecard" style="border-left-color:${ok?'var(--green)':'var(--red)'}"><b>${ok?'정답입니다!':'오답입니다.'}</b><br>정답: ⑤ Avoid Overwork and Find the Right Moment to Finish<br><br><b>해설</b><br>글은 그림에 지나치게 많은 것을 덧붙이면 작품의 효과를 망칠 수 있으므로, 때때로 물러나 진행 상황을 점검하고 적절한 시점에 멈추라고 조언합니다.</div>`;if(ok)conf()})}
let wIdx=0,wOK=0,wList=[];
function renderWordIntro(){$('wordWrap').innerHTML=evo('단어',0,0,DATA.wordList.length)+`<div class="bluecard">핵심어를 듣고 4지선다로 뜻을 확인합니다. 단어는 자동으로 한 번 읽어 줍니다.</div><button class="btn" id="wstart">단어 시작</button>`;$('wstart').onclick=()=>{wList=shuffle(DATA.wordList);wIdx=0;wOK=0;loadWord()}}
function loadWord(){
 if(wIdx>=wList.length)return finishWord();
 let q=wList[wIdx];
 let opts=shuffle([q.ko,...shuffle(DATA.wordList.filter(x=>x.ko!==q.ko)).slice(0,3).map(x=>x.ko)]);
 $('wordWrap').innerHTML=evo('단어',pct(wIdx,wList.length),wIdx,wList.length)+`<span class="status">${wIdx+1}/${wList.length}</span><div class="word">${q.en}</div><button class="btn secondary" id="wordListen">🔊 단어 다시 듣기</button><div class="grid" id="wopts" style="margin-top:10px"></div>`;
 setTimeout(()=>speak(q.en,.78),120);
 $('wordListen').onclick=()=>speak(q.en,.78);
 opts.forEach(o=>{
   let b=document.createElement('button');
   b.className='opt';
   b.textContent=o;
   b.onclick=()=>{
     let ok=o===q.ko;
     if(ok){b.classList.add('correct');wOK++;toast('단어 성장!')}
     else{b.classList.add('wrong');saveWrong(q);[...$('wopts').children].forEach(x=>{if(x.textContent===q.ko)x.classList.add('correct')})}
     setTimeout(()=>{wIdx++;loadWord()},650)
   };
   $('wopts').appendChild(b)
 })
}
function finishWord(){let sc=Math.round(wOK/wList.length*100);save('_word',{score:sc,correct:wOK,total:wList.length,time:new Date().toLocaleString('ko-KR')});conf();$('wordWrap').innerHTML=evo('단어',100,wList.length,wList.length)+`<div class="card" style="text-align:center"><h2>단어 완료</h2><div class="hist-val">${sc}점</div><button class="btn" onclick="renderWordIntro()">다시하기</button></div>`}
function saveWrong(w){let a=load('_wrong',[]);if(!a.find(x=>x.en===w.en)){a.push(w);save('_wrong',a)}}
let dIdx=0,auto=false,loopTimer=null,sortA=null,sortB=null;function markDictDone(i,item){let arr=load('_dictRecords',[]),now=new Date().toLocaleString('ko-KR'),r=arr.find(x=>x.index===i);if(r){r.completed=true;r.attempts=(r.attempts||0)+1;r.lastTime=now}else arr.push({index:i,sentenceNo:item.sentenceNo,partNo:item.partNo,totalParts:item.totalParts,completed:true,attempts:1,lastTime:now});arr.sort((a,b)=>a.index-b.index);save('_dictRecords',arr);save('_dict',{idx:i+1,total:DATA.dictationList.length,sentence:item.sentenceNo,part:item.partNo,time:now,completedCount:arr.filter(x=>x.completed).length})}
function stopDictLoop(){auto=false;clearTimeout(loopTimer);stopSpeech()}
function startDictLoop(){auto=true;let item=DATA.dictationList[dIdx];if(!item)return;let play=()=>{if(!auto)return;speak(item.en,.76,()=>{if(auto)loopTimer=setTimeout(play,900)})};play()}
function renderDict(){let item=DATA.dictationList[dIdx];if(!item)return;$('dictWrap').innerHTML=evo('영작',pct(dIdx,DATA.dictationList.length),dIdx,DATA.dictationList.length)+`<span class="status">영작 ${dIdx+1}/${DATA.dictationList.length} · 문장 ${item.sentenceNo}${item.totalParts>1?'-'+item.partNo+'/'+item.totalParts:''}</span><div class="meaning">${item.ko}</div><div class="tip">영작 문장은 자동 반복 재생됩니다. 정답을 맞히면 자동으로 다음으로 넘어갑니다.</div><button class="btn secondary" id="dpause">⏸ 일시정지</button><div class="answer" id="answer"></div><div class="chips" id="chips"></div><div id="dmsg"></div><details><summary class="sentence-small">전체 문장 보기</summary><div class="bluecard">${item.full}<br>${item.koFull}</div></details>`;item.en.replace(/[.,!?“”"':]/g,'').split(/\s+/).filter(Boolean).sort(()=>Math.random()-.5).forEach(w=>{let c=document.createElement('button');c.className='chip';c.textContent=w;c.onclick=()=>moveChip(c);$('chips').appendChild(c)});$('dpause').onclick=()=>{if(auto){auto=false;try{speechSynthesis.pause()}catch(e){};$('dpause').textContent='▶ 이어듣기'}else{auto=true;try{speechSynthesis.resume()}catch(e){};$('dpause').textContent='⏸ 일시정지';startDictLoop()}};if(window.Sortable){sortA=new Sortable($('answer'),{group:'d',animation:180,onSort:checkDict,onAdd:checkDict,onEnd:checkDict});sortB=new Sortable($('chips'),{group:'d',animation:180,onSort:checkDict,onAdd:checkDict,onEnd:checkDict})}save('_dictCurrent',{idx:dIdx+1,total:DATA.dictationList.length,sentence:item.sentenceNo,part:item.partNo,time:new Date().toLocaleString('ko-KR')})}
function moveChip(c){(c.parentElement.id==='chips'?$('answer'):$('chips')).appendChild(c);checkDict()}
function checkDict(){let item=DATA.dictationList[dIdx];let made=[...$('answer').children].map(x=>x.textContent).join(' ');let target=item.en.replace(/[.,!?“”"':]/g,'');if(norm(made)===norm(target)){stopDictLoop();$('dmsg').innerHTML='<div class="bluecard" style="border-left-color:var(--green)">정답! 다음으로 이동합니다.</div>';toast('영작 성장!');setTimeout(()=>{if(dIdx<DATA.dictationList.length-1){dIdx++;renderDict();startDictLoop()}else{conf();$('dictWrap').innerHTML=evo('영작',100,DATA.dictationList.length,DATA.dictationList.length)+'<div class="card" style="text-align:center"><h2>영작 완료!</h2><button class="btn" onclick="dIdx=0;renderDict();startDictLoop()">처음부터</button></div>'}},700)}}
let gIdx=0,gSel=null;
function renderGrammar(){let q=DATA.grammarList[gIdx];if(!q){$('grammarWrap').innerHTML='<div class="card"><h2>어법 완료</h2><button class="btn" onclick="gIdx=0;renderGrammar()">처음부터</button></div>';return}$('grammarWrap').innerHTML=`<span class="status">어법 ${gIdx+1}/${DATA.grammarList.length}</span><div class="card"><div style="font-weight:900;color:var(--main);line-height:1.6">${q.q}</div><div class="grid" id="gopts"></div><button class="btn" id="gcheck">정답 확인</button><div class="explain" id="gex"></div></div>`;shuffle(q.opts.map((o,i)=>({o,i}))).forEach(obj=>{let b=document.createElement('button');b.className='choice';b.dataset.i=obj.i;b.innerHTML=obj.o;b.onclick=()=>{gSel=obj.i;document.querySelectorAll('#gopts .choice').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')};$('gopts').appendChild(b)});$('gcheck').onclick=()=>{let ok=gSel===q.ans;document.querySelectorAll('#gopts .choice').forEach(b=>{if(+b.dataset.i===q.ans)b.classList.add('correct');else if(+b.dataset.i===gSel)b.classList.add('wrong')});let r=load('_grammar',{last:0,correct:0,total:0});r.last=Math.max(r.last,gIdx+1);r.total++;if(ok)r.correct++;r.time=new Date().toLocaleString('ko-KR');save('_grammar',r);$('gex').classList.add('show');$('gex').innerHTML=`<b>${ok?'정답 ⭕':'오답 ❌'}</b><br>${q.note}<button class="btn green" id="gnext" style="margin-top:10px">해설 읽고 다음</button>`;$('gnext').onclick=()=>{gIdx++;renderGrammar()}}}
function renderRecord(){let p=load('_problem',null),w=load('_word',null),d=load('_dict',null),g=load('_grammar',null),wr=load('_wrong',[]);$('recordWrap').innerHTML=`<div class="hist-card"><div class="hist-title">문제풀이</div><div class="hist-val">${p?(p.ok?'정답':'오답'):'기록 없음'}</div></div><div class="hist-card"><div class="hist-title">단어</div><div class="hist-val">${w? w.score+'점':'기록 없음'}</div><div class="sentence-small">${w? w.correct+'/'+w.total+' · '+w.time:''}</div></div><div class="hist-card"><div class="hist-title">영작</div><div class="hist-val">${d?d.idx+' / '+d.total:'기록 없음'}</div><div class="sentence-small">${d?'문장 '+d.sentence+(d.part?'-'+d.part:'')+' · '+d.time:''}</div></div><div class="hist-card"><div class="hist-title">어법</div><div class="hist-val">${g?g.last+' / '+DATA.grammarList.length:'기록 없음'}</div><div class="sentence-small">${g?'정답 '+g.correct+'/'+g.total:''}</div></div><div class="hist-card"><div class="hist-title">오답 단어</div><div class="hist-val">${wr.length}개</div></div><button class="btn red" onclick="Object.keys(localStorage).filter(k=>k.startsWith(STORE)).forEach(k=>localStorage.removeItem(k));renderRecord()">기록 초기화</button>`}
function renderWrong(){let a=load('_wrong',[]);if(!a.length){$('wrongWrap').innerHTML='<div class="bluecard">오답 단어가 없습니다.</div>';return}$('wrongWrap').innerHTML=a.map((w,i)=>`<div class="wrong-item"><div><b>${w.en}</b><br><span class="sentence-small">${w.ko}</span></div><button class="btn secondary" style="width:auto" data-i="${i}">삭제</button></div>`).join('')+'<button class="btn red" id="clearW">전체 비우기</button>';document.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{let x=load('_wrong',[]);x.splice(+b.dataset.i,1);save('_wrong',x);renderWrong()});$('clearW').onclick=()=>{save('_wrong',[]);renderWrong()}}
renderProblem();renderWordIntro();renderDict();renderGrammar();
</script></body></html>
