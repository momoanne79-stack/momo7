<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수리나무학원 중등독해 - Shackleton</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<style>
:root{--main:#1a5c9a;--accent:#f5a623;--bg:#f3f8ff;--light:#eef7ff;--text:#132235;--green:#27ae60;--red:#e74c3c;--line:#cfe4f8;--shadow:0 10px 30px rgba(26,92,154,.16)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;color:var(--text);padding:14px} #app{max-width:480px;margin:0 auto;background:#fff;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);min-height:95vh;position:relative}.header{background:linear-gradient(135deg,var(--main),#0e355b);color:#fff;text-align:center;padding:26px 18px 20px}.header h1{font-size:20px;margin:0 0 6px;font-weight:900}.header p{margin:0;font-size:13px;opacity:.88}
.nav{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px 12px 0;width:100%}
.nav button{width:100%;min-height:44px;border:0;border-radius:13px;padding:10px 3px;font-size:13px;font-weight:900;background:#edf2f7;color:#4a5568;white-space:nowrap;box-shadow:inset 0 -2px 0 rgba(0,0,0,.04);cursor:pointer;touch-action:manipulation;transition:.15s}
.nav button:active{transform:scale(.97)}
.nav button.active{background:var(--main);color:#fff;box-shadow:0 4px 12px rgba(26,92,154,.22)}
.section{display:none;padding:17px 16px 28px}.section.active{display:block;animation:fade .25s}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.card{background:#fff;border:2px solid var(--line);border-radius:16px;padding:14px;margin-bottom:13px;line-height:1.65}.blue-card{background:var(--light);border-color:#b9d9f5}.title{font-size:17px;font-weight:900;color:var(--main);margin:0 0 8px}.small{font-size:12px;color:#718096;font-weight:700}.btn{display:block;width:100%;min-height:49px;border:0;border-radius:14px;padding:14px 12px;font-size:15px;font-weight:900;background:var(--main);color:#fff;margin-top:10px;cursor:pointer;touch-action:manipulation;box-shadow:0 5px 14px rgba(26,92,154,.18);transition:.15s}.btn:active{transform:scale(.98)}.btn.sub{background:#718096}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.orange{background:var(--accent);color:#3b2600}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;align-items:stretch}.row .btn{margin-top:0;width:100%;height:100%;min-height:50px}.status{display:inline-block;background:#edf2f7;border-radius:20px;padding:6px 11px;font-size:12px;font-weight:900;color:#4a5568;margin-bottom:9px}.evo{background:var(--light);border:2px solid #b9d9f5;border-radius:16px;padding:12px;text-align:center;margin-bottom:13px}.evo .emoji{font-size:42px;transition:.25s}.evo .name{font-size:13px;font-weight:900;color:var(--main);margin:4px 0 8px}.bar-bg{height:10px;background:#d9ecff;border-radius:10px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--main));transition:.35s}.body-title{font-size:15px;font-weight:900;color:#0f355a;margin:12px 0 5px}.body-text{font-family:Georgia,'Times New Roman',serif;font-size:16px;line-height:1.85;white-space:pre-line}.listen-panel{position:sticky;top:0;z-index:3;background:#fff;border:2px solid var(--line);border-radius:16px;padding:12px;margin-bottom:12px}.now-sentence{background:#fff8e8;border-left:4px solid var(--accent);padding:9px;border-radius:10px;font-size:13px;font-weight:800;line-height:1.5;margin-top:10px}.word-display{text-align:center;font-size:30px;font-weight:900;color:var(--main);margin:15px 0 18px;line-height:1.25}.opts{display:grid;gap:10px;width:100%}.opt{width:100%;min-height:48px;border:2px solid var(--line);background:#fff;border-radius:14px;padding:13px;text-align:left;font-size:15px;font-weight:800;cursor:pointer;touch-action:manipulation}.opt.correct{background:#d4edda;border-color:var(--green);color:#176b37}.opt.wrong{background:#fde8e8;border-color:var(--red);color:#b83227}.ko{background:var(--light);border-left:5px solid var(--main);border-radius:12px;padding:13px;font-size:15px;font-weight:900;line-height:1.55;color:#0f355a;margin-bottom:10px}.answer,.bank{min-height:58px;border:2px dashed var(--main);border-radius:14px;padding:11px;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;align-items:center;margin-bottom:10px}.bank{border-style:solid;background:#f9fcff;border-color:var(--line)}.chip{border:2px solid #b9d9f5;background:white;border-radius:10px;padding:8px 12px;font-size:14px;font-weight:800;cursor:grab;touch-action:none;user-select:none;display:inline-flex;align-items:center;justify-content:center}.sortable-ghost{opacity:.35;background:#d9ecff!important}.sortable-drag{background:var(--main)!important;color:#fff!important;transform:scale(1.06)}.chip:active{transform:scale(.96)}.tip{font-size:12px;font-weight:800;background:#fffbeb;border:1px solid #f6c94e;color:#8a6300;border-radius:10px;padding:8px 10px;margin-bottom:10px;line-height:1.45}.chunks{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px}.chunk{border:2px solid var(--line);border-radius:12px;overflow:hidden;background:white;min-width:72px;cursor:pointer}.chunk.active{border-color:var(--main);box-shadow:0 0 0 3px rgba(26,92,154,.12)}.chunk.done{border-color:var(--green);background:#f0fff4}.chunk.done2{border-color:var(--main);background:var(--light)}.chunk-en{font-size:12px;font-weight:900;padding:7px;background:#f6fbff;border-bottom:1px dashed var(--line);text-align:center}.chunk-ans{font-size:11px;font-weight:900;color:#9aa6b2;padding:5px;text-align:center}.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}.choice{width:100%;min-height:45px;border:0;border-radius:12px;background:#edf2f7;color:#243447;padding:11px 6px;font-size:13px;font-weight:900;cursor:pointer;touch-action:manipulation;line-height:1.25}.choice:active{transform:scale(.98)}.note{background:#fff;border:2px solid var(--accent);border-radius:14px;padding:12px;margin-top:12px;display:none}.note.show{display:block}.note-row{background:#f6fbff;border-left:4px solid var(--main);border-radius:9px;padding:9px;margin:7px 0;font-size:13px;line-height:1.55}.hist-card{background:#fff;border:2px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}.hist-card b{color:var(--main)}.wrong-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#fff5f5;border-left:5px solid var(--red);border-radius:12px;padding:11px;margin-bottom:8px;width:100%}.wrong-en{font-weight:900;color:#c0392b}.wrong-ko{font-size:13px;color:#555}.del{border:0;border-radius:10px;background:#edf2f7;padding:9px 11px;font-weight:900;color:#555;min-width:54px;cursor:pointer}.combo{position:fixed;top:25%;left:50%;transform:translate(-50%,-50%) scale(.5);font-size:32px;font-weight:900;color:var(--accent);text-shadow:0 3px 8px rgba(0,0,0,.18);opacity:0;pointer-events:none;z-index:50}.combo.pop{animation:pop 1s forwards}@keyframes pop{0%{opacity:0;transform:translate(-50%,-20%) scale(.5)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.25)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-70%) scale(.85)}}

@media (max-width:360px){
  body{padding:8px}
  .nav{gap:4px;padding:10px 8px 0}
  .nav button{font-size:12px;min-height:42px;padding:9px 2px}
  .row{grid-template-columns:1fr}
  .choices{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
<div id="combo" class="combo"></div>
<div class="header"><h1>수리나무학원 중등독해</h1><p>Shackleton · 전체 문장 의미단위 영작</p></div>
<div class="nav">
<button class="active" onclick="showSec('word',this)">단어</button>
<button onclick="showSec('dict',this)">영작</button>
<button onclick="showSec('anal',this)">분석</button>
<button onclick="showSec('hist',this);renderHistory()">기록</button>
<button onclick="showSec('wrong',this);renderWrong()">오답</button>
</div>
<section id="word" class="section active">
<div id="wordStart" class="card blue-card" style="text-align:center"><div style="font-size:46px">🥚</div><div class="title">단어 훈련 시작</div><p class="small">중요 단어를 맞히면 진행률이 올라갑니다.</p><button class="btn" onclick="startWord()">시작하기</button></div>
<div id="wordQuiz" style="display:none"><span class="status" id="wordStatus"></span><div class="evo"><div class="emoji" id="wordEvo">🥚</div><div class="name" id="wordEvoName">수상한 알</div><div class="bar-bg"><div class="bar" id="wordBar"></div></div></div><div class="word-display" id="wordEn"></div><div class="opts" id="wordOpts"></div></div>
<div id="wordResult" class="card" style="display:none;text-align:center"></div>
</section>
<section id="dict" class="section">
<div class="evo"><div class="emoji" id="dictEvo">🥚</div><div class="name" id="dictEvoName">수상한 알</div><div class="bar-bg"><div class="bar" id="dictBar"></div></div></div>
<div class="card blue-card"><span class="status" id="dictStatus"></span><div class="ko" id="dictKo"></div><div class="tip">단어를 <b>드래그</b>해서 옮기거나, 단어를 한 번 <b>터치</b>해서 이동할 수 있습니다. 답안칸 단어를 다시 누르면 아래로 내려갑니다.</div><div class="answer" id="answer"></div><div class="bank" id="bank"></div><div class="row"><button class="btn orange" onclick="toggleDictLoop()" id="dictAudioBtn">🔊 자동 반복 듣기</button><button class="btn sub" onclick="resetDictCurrent()">↩ 다시 놓기</button></div><div class="small" style="margin-top:8px">정답을 맞혀야 다음 문장/의미 단위로 넘어갑니다. 긴 문장은 의미 단위로 나누었습니다.</div></div>
</section>
<section id="anal" class="section">
<div id="analStart" class="card blue-card" style="text-align:center"><div style="font-size:46px">🧩</div><div class="title">문장분석 훈련</div><p class="small">주요 문장을 품사 → 문장성분 순서로 분석합니다.</p><button class="btn" onclick="startAnal()">분석 시작</button></div>
<div id="analQuiz" style="display:none"><span class="status" id="analStatus"></span><div class="ko" id="analKo"></div><div class="chunks" id="chunks"></div><div class="choices" id="choices"></div><div class="note" id="noteBox"></div><div id="patternBox"></div></div>
</section>
<section id="hist" class="section"><div class="title">학습 기록 확인</div><div id="histWrap"></div></section>
<section id="wrong" class="section"><div class="title" style="color:var(--red)">오답 단어</div><div id="wrongWrap"></div><button class="btn red" onclick="clearWrong()">오답 전체 비우기</button></section>
</div>
<script>
const STORE='surinamu_shackleton_middle_v1';
const wordList = [{"en": "explore", "ko": "탐험하다"}, {"en": "new lands", "ko": "새로운 땅, 신대륙"}, {"en": "head for", "ko": "~로 향하다"}, {"en": "Antarctica", "ko": "남극 대륙"}, {"en": "team", "ko": "팀, 무리"}, {"en": "cross the sea", "ko": "바다를 건너다"}, {"en": "thick ice", "ko": "두꺼운 얼음"}, {"en": "get stuck", "ko": "꼼짝 못하게 되다, 갇히다"}, {"en": "pass", "ko": "지나가다"}, {"en": "melt", "ko": "녹다"}, {"en": "break into pieces", "ko": "산산조각 내다 / 산산조각 나다"}, {"en": "sink", "ko": "가라앉다"}, {"en": "order", "ko": "명령하다"}, {"en": "give up", "ko": "포기하다, 버리다"}, {"en": "under the water", "ko": "물속에"}, {"en": "make a camp", "ko": "야영지를 만들다"}, {"en": "keep strong", "ko": "강한 모습을 유지하다"}, {"en": "set a new goal", "ko": "새로운 목표를 세우다"}, {"en": "return home safely", "ko": "무사히 집으로 돌아가다"}, {"en": "lifeboat", "ko": "구명보트"}, {"en": "Elephant Island", "ko": "엘리펀트섬"}, {"en": "stand on land", "ko": "땅에 서다"}, {"en": "little food", "ko": "거의 없는 식량"}, {"en": "South Georgia", "ko": "사우스조지아섬"}, {"en": "a sea of death", "ko": "죽음의 바다"}, {"en": "set out for", "ko": "~로 출발하다"}, {"en": "fight against", "ko": "~에 맞서 싸우다"}, {"en": "big waves", "ko": "큰 파도"}, {"en": "strong winds", "ko": "강한 바람"}, {"en": "make it to", "ko": "힘들게 ~에 도착하다"}, {"en": "shout for joy", "ko": "기뻐서 소리치다"}, {"en": "not a single life", "ko": "단 한 명의 목숨도"}];

t to the island today.", "ko": "우리는 오늘 그 섬에 도착했다."}, {"en": "It took us 7 days on the sea", "ko": "우리는 바다 위에서 7일이 걸렸다."}, {"en": "to get to the island", "ko": "그 섬에 도착하는 데"}, {"en": "And after 497 days", "ko": "그리고 497일 후에"}, {"en": "we finally stood on land again", "ko": "우리는 마침내 다시 육지에 섰다."}, {"en": "But there is no help on this island.", "ko": "하지만 이 섬에는 아무 도움도 없다."}, {"en": "There is little food to eat", "ko": "먹을 음식이 거의 없다."}, {"en": "and the weather is so cold", "ko": "그리고 날씨가 매우 춥다."}, {"en": "April 24th 1916", "ko": "1916년 4월 24일"}, {"en": "We can get help in South Georgia.", "ko": "우리는 South Georgia에서 도움을 받을 수 있다."}, {"en": "The island is 1300 kilometers away", "ko": "그 섬은 1,300킬로미터 떨어져 있다."}, {"en": "and a sea of death is in front of us", "ko": "그리고 죽음의 바다가 우리 앞에 있다."}, {"en": "But I should do this for my men.", "ko": "하지만 나는 부하들을 위해 이것을 해야 한다."}, {"en": "I set out for South Georgia today.", "ko": "나는 오늘 South Georgia로 출발했다."}, {"en": "Shackleton and five of his men fought against big waves and strong winds", "ko": "Shackleton과 그의 부하 다섯 명은 큰 파도와 강한 바람에 맞서 싸웠다."}, {"en": "for 16 days", "ko": "16일 동안"}, {"en": "Finally they made it to South Georgia.", "ko": "마침내 그들은 South Georgia에 도착했다."}, {"en": "They got help from there", "ko": "그들은 그곳에서 도움을 받았다."}, {"en": "and went back to Elephant Island", "ko": "그리고 Elephant Island로 돌아갔다."}, {"en": "When the men on the island saw the ship", "ko": "섬에 있던 사람들이 배를 보았을 때"}, {"en": "they all shouted for joy", "ko": "그들은 모두 기뻐서 소리쳤다."}, {"en": "Not a single life was lost!", "ko": "단 한 명의 목숨도 잃지 않았다!"}, {"en": "Everyone was saved.", "ko": "모두가 구조되었다."}];

const bodyParts = [{"title": "본문 1", "text": "In the early 1900s, many people explored new lands. Ernest Shackleton was one of them. He headed for Antarctica with a team of 28 men in August 1914.\n\nOn January 20, 1915, Shackleton's team was crossing the sea near Antarctica. Suddenly, the ship hit thick ice and got stuck. The men had to wait until the winter passed."}, {"title": "October 28th, 1915", "text": "Nine long months passed and the ice started melting. But, the ice broke the ship into pieces. The ship started sinking. I ordered my men, “Give up the ship. She’s going down!”"}, {"title": "November 21st, 1915", "text": "The ship has sunk under the water today. We lost our home and we had to make a camp on the ice. All I can do is to keep strong for my men. My dream to go to Antarctica is broken, but I’ve set a new goal. I’ll make my men return home safely."}, {"title": "April 15th, 1916", "text": "I had my men get on the three lifeboats to go to Elephant Island. We got to the island today. It took us 7 days on the sea to get to the island. And after 497 days, we finally stood on land again. But, there is no help on this island. There is little food to eat and the weather is so cold."}, {"title": "April 24th, 1916", "text": "We can get help in South Georgia. The island is 1,300 kilometers away and a sea of death is in front of us. But I should do this for my men. I set out for South Georgia today."}, {"title": "결말", "text": "Shackleton and five of his men fought against big waves and strong winds for 16 days. Finally, they made it to South Georgia. They got help from there and went back to Elephant Island. When the men on the island saw the ship, they all shouted for joy. Not a single life was lost! Everyone was saved."}];

let selectedVoice=null;
function loadVoice(){ if(!('speechSynthesis' in window)) return; const voices=speechSynthesis.getVoices(); selectedVoice=voices.find(v=>(v.lang==='en-US'||v.lang==='en_US') && /samantha|alex|ava|allison|nicky|english/i.test(v.name)) || voices.find(v=>v.lang==='en-US'||v.lang==='en_US') || null; }
if('speechSynthesis' in window){ loadVoice(); speechSynthesis.onvoiceschanged=loadVoice; }
function speak(text, rate=0.78, onend=null){ if(!('speechSynthesis' in window)) return; loadVoice(); speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=rate; u.pitch=1; u.volume=1; if(selectedVoice) u.voice=selectedVoice; if(onend) u.onend=onend; speechSynthesis.speak(u); setTimeout(()=>speechSynthesis.resume(),60); }
function stopSpeak(){ if('speechSynthesis' in window) speechSynthesis.cancel(); }
function $(id){return document.getElementById(id)}
function shuffle(a){const arr=[...a]; for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];} return arr;}
function nowStr(){return new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function getJSON(k,d){try{return JSON.parse(localStorage.getItem(STORE+k)||JSON.stringify(d));}catch(e){return d;}}
function setJSON(k,v){localStorage.setItem(STORE+k,JSON.stringify(v));}
function showSec(id,btn){ if(id!=='dict') stopDictLoop(); document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); $(id).classList.add('active'); btn.classList.add('active'); if(id==='dict'){ if(!dictLoaded){loadDict(); dictLoaded=true;} startDictLoop(); }}
function showCombo(){ const c=$('combo'); c.textContent='정답! ✨'; c.classList.remove('pop'); void c.offsetWidth; c.classList.add('pop'); }
function updateEvo(prefix,cur,total){ const r= total?cur/total:0; const stages=[['🥚','수상한 알'],['🐣','부화 시작'],['🦎','집중 도마뱀'],['🦖','독해 공룡'],['🐲','성장 용'],['🕊️','평화 비둘기'],['🦅','비상 독수리'],['🐦‍⬛','검은 새'],['🐦','거대 비둘기 진화']]; const idx=Math.min(stages.length-1, Math.floor(r*(stages.length-1))); $(prefix+'Evo').textContent=stages[idx][0]; $(prefix+'EvoName').textContent=`${stages[idx][1]} (${Math.round(r*100)}%)`; $(prefix+'Bar').style.width=Math.round(r*100)+'%'; }
function renderBody(){ const bw=$('bodyWrap'); if(!bw) return; let h=''; bodyParts.forEach(p=>{h+=`<div class="card"><div class="body-title">${p.title}</div><div class="body-text">${p.text}</div></div>`}); bw.innerHTML=h; } renderBody();
let readIdx=0, readRep=1, reading=false, readPaused=false;
function startReading(){ readIdx=0; readRep=1; reading=true; readPaused=false; playReading(); }
function playReading(){ if(!reading||readPaused) return; if(readIdx>=sentenceList.length){ $('readStatus').textContent='✅ 본문 듣기 완료'; saveListen(); reading=false; return; } const s=sentenceList[readIdx].en; $('readStatus').textContent=`문장 ${readIdx+1}/${sentenceList.length} · ${readRep}/3회: ${s}`; speak(s,0.78,()=>{ if(!reading||readPaused) return; if(readRep<3){readRep++; setTimeout(playReading,550);} else {readRep=1; readIdx++; setTimeout(playReading,750);} }); }
function pauseReading(){ if(!reading) return; if(readPaused){ readPaused=false; $('pauseReadBtn').textContent='⏸ 일시정지'; playReading(); } else { readPaused=true; stopSpeak(); $('pauseReadBtn').textContent='▶ 이어듣기'; $('readStatus').textContent+=' · 일시정지'; } }
function stopReading(){ reading=false; readPaused=false; stopSpeak(); if($('pauseReadBtn')) $('pauseReadBtn').textContent='⏸ 일시정지'; if($('readStatus')) $('readStatus').textContent='대기 중'; }
function saveListen(){ const h=getJSON('_listen',[]); h.unshift({time:nowStr(),total:sentenceList.length}); setJSON('_listen',h.slice(0,10)); }
let wArr=[],wIdx=0,wOk=0,wBusy=false;
function startWord(){ wArr=shuffle(wordList); wIdx=0; wOk=0; $('wordStart').style.display='none'; $('wordResult').style.display='none'; $('wordQuiz').style.display='block'; loadWord(); }
function loadWord(){ wBusy=false; updateEvo('word',wIdx,wArr.length); const q=wArr[wIdx]; $('wordStatus').textContent=`${wIdx+1} / ${wArr.length}`; $('wordEn').textContent=q.en; speak(q.en,0.78); const wrong=shuffle(wordList.filter(x=>x.ko!==q.ko)).slice(0,3).map(x=>({text:x.ko,ok:false})); const opts=shuffle([{text:q.ko,ok:true},...wrong]); $('wordOpts').innerHTML=''; opts.forEach((o,i)=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=`${i+1}. ${o.text}`; b.onclick=()=>pickWord(b,o.ok,q); $('wordOpts').appendChild(b); }); }
function pickWord(btn,ok,q){ if(wBusy) return; wBusy=true; if(ok){btn.classList.add('correct'); wOk++; showCombo();} else {btn.classList.add('wrong'); saveWrong(q); [...$('wordOpts').children].forEach(b=>{if(b.textContent.includes(q.ko)) b.classList.add('correct')});} setTimeout(()=>{wIdx++; if(wIdx<wArr.length) loadWord(); else finishWord();},700); }
function finishWord(){ const score=Math.round(wOk/wArr.length*100); updateEvo('word',wArr.length,wArr.length); $('wordQuiz').style.display='none'; $('wordResult').style.display='block'; $('wordResult').innerHTML=`<div style="font-size:50px">${score>=80?'🎉':'💪'}</div><div class="title">단어 완료</div><div style="font-size:34px;font-weight:900;color:var(--main)">${score}점</div><p>${wOk}/${wArr.length}개 정답</p><button class="btn" onclick="startWord()">다시 하기</button>`; const h=getJSON('_word',[]); h.unshift({time:nowStr(),score,ok:wOk,total:wArr.length}); setJSON('_word',h.slice(0,10)); if(score>=90 && window.confetti) confetti({particleCount:120,spread:70,origin:{y:.65}}); }
let dIdx=0, dictLoaded=false, dictLoop=false, dictTimer=null;
let dictSortReady=false, answerSortable=null, bankSortable=null;
function initDictDrag(){
  if(dictSortReady || typeof Sortable==='undefined') return;
  const group={name:'dictWords', pull:true, put:true};
  const common={group, animation:180, ghostClass:'sortable-ghost', dragClass:'sortable-drag', fallbackOnBody:true, forceFallback:true, swapThreshold:.65, onEnd:()=>{ setTimeout(()=>{ if($('bank') && $('bank').children.length===0) checkDict(); },40); }};
  answerSortable = new Sortable($('answer'), common);
  bankSortable = new Sortable($('bank'), common);
  dictSortReady=true;
}
function tokenize(s){ const m=s.match(/[A-Za-z0-9]+(?:['’][A-Za-z0-9]+)?/g); return m?m:[]; }
function norm(s){ return (s||'').toLowerCase().replace(/[’]/g,"'").replace(/[^a-z0-9']/g,''); }
function loadDict(){ stopDictLoop(); updateEvo('dict',dIdx,sentenceList.length); const s=sentenceList[dIdx]; $('dictStatus').textContent=`영작 ${dIdx+1} / ${sentenceList.length}`; $('dictKo').textContent=s.ko; $('answer').innerHTML=''; $('bank').innerHTML=''; shuffle(tokenize(s.en)).forEach(w=>addChip(w,$('bank'))); initDictDrag(); }
function addChip(w,parent){ const b=document.createElement('div'); b.className='chip'; b.textContent=w; b.setAttribute('role','button'); b.tabIndex=0; b.onclick=()=>{ if(b.parentElement.id==='bank') $('answer').appendChild(b); else $('bank').appendChild(b); if($('bank').children.length===0) checkDict(); }; b.onkeydown=(e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); b.click(); } }; parent.appendChild(b); }
function checkDict(){ const ans=[...$('answer').children].map(x=>x.textContent).join(' '); if(norm(ans)===norm(tokenize(sentenceList[dIdx].en).join(' '))){ showCombo(); saveDictProgress(dIdx+1); stopDictLoop(); $('answer').style.background='#d4edda'; setTimeout(()=>{ $('answer').style.background=''; if(dIdx<sentenceList.length-1){dIdx++; loadDict(); startDictLoop();} else {updateEvo('dict',sentenceList.length,sentenceList.length); if(window.confetti) confetti({particleCount:140,spread:75,origin:{y:.65}}); alert('영작 완료!');}},650); } else { $('answer').style.background='#fde8e8'; setTimeout(()=>$('answer').style.background='',500); } }
function resetDictCurrent(){ loadDict(); startDictLoop(); }
function startDictLoop(){ dictLoop=true; $('dictAudioBtn').textContent='🔇 반복 멈춤'; playDictLoop(); }
function stopDictLoop(){ dictLoop=false; clearTimeout(dictTimer); stopSpeak(); if($('dictAudioBtn')) $('dictAudioBtn').textContent='🔊 자동 반복 듣기'; }
function toggleDictLoop(){ if(dictLoop) stopDictLoop(); else startDictLoop(); }
function playDictLoop(){ if(!dictLoop) return; speak(sentenceList[dIdx].en,0.76,()=>{ if(dictLoop) dictTimer=setTimeout(playDictLoop,900); }); }
function saveDictProgress(n){ const p=getJSON('_dict',{last:0,done:[],events:[]}); p.last=Math.max(p.last,n); if(!p.done.includes(n)) p.done.push(n); p.done.sort((a,b)=>a-b); p.events.unshift({time:nowStr(),num:n}); p.events=p.events.slice(0,12); setJSON('_dict',p); }
function saveWrong(w){ const arr=getJSON('_wrong',[]); if(!arr.find(x=>x.en===w.en)) arr.push(w); setJSON('_wrong',arr); }
let aIdx=0,aStage=1,aActive=0,aDone=[];
function startAnal(){ $('analStart').style.display='none'; $('analQuiz').style.display='block'; aIdx=0; loadAnal(); }
function loadAnal(){ aStage=1; aActive=0; const item=analysisList[aIdx]; aDone=new Array(item.chunks.length).fill(false); $('analStatus').textContent=`분석 ${aIdx+1}/${analysisList.length} · 1단계 품사`; $('analKo').textContent=item.ko; $('noteBox').className='note'; $('noteBox').innerHTML=''; $('patternBox').innerHTML=''; renderChunks(); renderChoices(posList); }
function renderChunks(){ const item=analysisList[aIdx]; $('chunks').innerHTML=''; item.chunks.forEach((c,i)=>{ const d=document.createElement('div'); d.className='chunk'+(i===aActive&&!aDone[i]?' active':'')+(aDone[i]?(aStage===1?' done':' done2'):''); d.onclick=()=>{ if(!aDone[i]){aActive=i; renderChunks();} }; d.innerHTML=`<div class="chunk-en">${c[0]}</div><div class="chunk-ans" id="ca${i}">?</div>`; $('chunks').appendChild(d); }); }
function renderChoices(list){ $('choices').innerHTML=''; list.forEach(x=>{ const b=document.createElement('button'); b.className='choice'; b.textContent=x; b.onclick=()=>pickAnal(x); $('choices').appendChild(b); }); }
function pickAnal(val){ const item=analysisList[aIdx], c=item.chunks[aActive]; const correct=aStage===1?c[1]:c[2]; if(val===correct){ showCombo(); aDone[aActive]=true; const next=aDone.indexOf(false); if(next>=0){aActive=next; renderChunks();} else { if(aStage===1) showStep1Done(); else showAnalDone(); } } else { alert('다시 생각해 보세요!'); } }
function showStep1Done(){ let h='<div class="title">1단계 완료</div>'; analysisList[aIdx].chunks.forEach(c=>{ if(c[3]) h+=`<div class="note-row"><b>${c[0]}</b><br>${c[3].replace(/\\n/g,'<br>')}</div>`; }); h+='<button class="btn" onclick="startStep2()">해설 읽었어요 · 2단계로</button>'; $('noteBox').innerHTML=h; $('noteBox').className='note show'; $('choices').innerHTML=''; }
function startStep2(){ aStage=2; aActive=0; aDone=new Array(analysisList[aIdx].chunks.length).fill(false); $('analStatus').textContent=`분석 ${aIdx+1}/${analysisList.length} · 2단계 성분`; $('noteBox').className='note'; renderChunks(); renderChoices(roleList); }
function showAnalDone(){ saveAnal(aIdx+1); $('choices').innerHTML=''; $('patternBox').innerHTML=`<div class="card blue-card" style="text-align:center"><div class="title">완료!</div><p><b>${analysisList[aIdx].pattern}</b></p><button class="btn" onclick="nextAnal()">다음 문장</button></div>`; }
function nextAnal(){ if(aIdx<analysisList.length-1){aIdx++; loadAnal();} else {$('analQuiz').innerHTML='<div class="card" style="text-align:center"><div style="font-size:50px">🎉</div><div class="title">문장분석 완료</div></div>'; if(window.confetti) confetti({particleCount:120,spread:70,origin:{y:.65}});} }
function saveAnal(n){ const p=getJSON('_anal',{last:0,done:[]}); p.last=Math.max(p.last,n); if(!p.done.includes(n)) p.done.push(n); setJSON('_anal',p); }
function renderHistory(){ const w=getJSON('_word',[])[0]; const d=getJSON('_dict',{last:0,done:[],events:[]}); const a=getJSON('_anal',{last:0,done:[]}); const wrong=getJSON('_wrong',[]); let h=''; h+=`<div class="hist-card"><b>단어</b><br>${w?`${w.time} · ${w.score}점 (${w.ok}/${w.total})`:'기록 없음'}</div>`; h+=`<div class="hist-card"><b>영작</b><br>마지막 완료: <b>${d.last}번</b> / ${sentenceList.length}<br>완료 문장: ${d.done.length?d.done.join(', '):'없음'}<br><span class="small">최근: ${d.events.slice(0,5).map(e=>e.num+'번('+e.time+')').join(' · ')||'없음'}</span></div>`; h+=`<div class="hist-card"><b>문장분석</b><br>마지막 완료: <b>${a.last}번</b> / ${analysisList.length}<br>완료: ${a.done.length? a.done.join(', '):'없음'}</div>`; h+=`<div class="hist-card"><b>오답 단어</b><br>${wrong.length}개</div>`; $('histWrap').innerHTML=h; }
function renderWrong(){ const arr=getJSON('_wrong',[]); if(!arr.length){$('wrongWrap').innerHTML='<div class="card blue-card">오답이 없습니다.</div>';return;} $('wrongWrap').innerHTML=''; arr.forEach((w,i)=>{ const d=document.createElement('div'); d.className='wrong-item'; d.innerHTML=`<div><div class="wrong-en">${w.en}</div><div class="wrong-ko">${w.ko}</div></div><button class="del" onclick="delWrong(${i})">삭제</button>`; $('wrongWrap').appendChild(d); }); }
function delWrong(i){ const arr=getJSON('_wrong',[]); arr.splice(i,1); setJSON('_wrong',arr); renderWrong(); }
function clearWrong(){ if(confirm('오답을 모두 비울까요?')){setJSON('_wrong',[]); renderWrong();} }
</script>
