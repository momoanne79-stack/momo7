let audioCtx=null,combo=0;function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}function tone(f,t,d){if(!audioCtx)return;let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=.08;g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}function okS(){tone(600,'sine',.1);setTimeout(()=>tone(800,'sine',.15),100)}function ngS(){tone(260,'sawtooth',.2)}function boom(){confetti({particleCount:120,spread:70,origin:{y:.6}})}function shuf(a){let r=[...a];for(let i=r.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}function day(){let t=new Date();return t.toISOString().slice(0,10)}function pop(ok){if(!ok){combo=0;return}combo++;if(combo<2)return;let e=document.getElementById('combo');e.textContent=combo+' COMBO! ✨';e.classList.remove('pop');void e.offsetWidth;e.classList.add('pop')}function evo(p,c,t){let r=t?c/t:0,s=[[0,'🥚','수상한 알'],[.001,'🐣','부화한 새'],[.25,'🦎','꼬마 탐험가'],[.5,'🦖','파워 독해러'],[.75,'🕊️','자유의 새'],[1,'🕊️✨','행복한 새 마스터']],st=s[0];s.forEach(x=>{if(r>=x[0])st=x});document.getElementById(p+'e').textContent=st[1];document.getElementById(p+'n').textContent=st[2]+' ('+Math.floor(r*100)+'%)';document.getElementById(p+'b').style.width=Math.floor(r*100)+'%'}

let di=0,loop=false,timer=null,loaded=false,sp=0,lock=false,speeds=[.78,.62,.5],labs=['🇺🇸 보통','🐢 느리게','🐌 아주 느리게'];function cleanWords(s){return s.replace(/[“”"‘’.,!?;:()]/g,'').split(/\s+/).filter(Boolean)}function loopPlay(){if(!loop)return;speak(sentenceList[di].en,speeds[sp],()=>{if(loop)timer=setTimeout(loopPlay,900)})}function stopLoop(){loop=false;if('speechSynthesis'in window)speechSynthesis.cancel();clearTimeout(timer)}function togAudio(){loop=!loop;if(loop)loopPlay();else stopLoop();updPlay()}function updPlay(){let b=document.getElementById('play');b.textContent=loop?'⏸️ 음성 멈춤':'▶️ 원어민 음성';b.className='play'+(loop?' on':'')}function togSpeed(){sp=(sp+1)%3;document.getElementById('speed').textContent=labs[sp];if(loop){stopLoop();loop=true;loopPlay()}}function loadDict(){lock=false;stopLoop();evo('d',di,sentenceList.length);let s=sentenceList[di];document.getElementById('dstat').textContent=`영작 ${di+1} / ${sentenceList.length}`;document.getElementById('dko').textContent=s.ko;let a=document.getElementById('answer'),sc=document.getElementById('scramble');a.innerHTML='';sc.innerHTML='';a.style.background='var(--light)';shuf(cleanWords(s.en)).forEach(w=>{let b=document.createElement('button');b.className='chip';b.textContent=w;b.onclick=function(){if(lock)return;(this.parentElement.id==='scramble'?a:sc).appendChild(this);if(!sc.children.length)checkDict()};sc.appendChild(b)});if(!window.sort)window.sort=new Sortable(a,{animation:250,onEnd:()=>{if(!document.getElementById('scramble').children.length)checkDict()}});loop=true;loopPlay();updPlay()}function norm(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'')}function checkDict(){if(lock)return;let stu=[...document.getElementById('answer').children].map(x=>x.textContent).join(' ');if(norm(stu)===norm(sentenceList[di].en)){lock=true;okS();pop(true);document.getElementById('answer').style.background='#d4edda';recDict();stopLoop();updPlay();setTimeout(nextDict,700)}else{ngS();pop(false);document.getElementById('answer let ai=0,stage=1,active=0,ans=[];function startAnal(){ai=0;document.getElementById('aintro').style.display='none';document.getElementById('ares').style.display='none';document.getElementById('aquiz').style.display='block';loadAnal()}function loadAnal(){stage=1;active=0;evo('a',ai,analysisList.length);let d=analysisList[ai];ans=new Array(d.chunks.length).fill(null);document.getElementById('acount').textContent=`${ai+1} / ${analysisList.length}`;document.getElementById('ako').textContent=d.ko;document.getElementById('info').classList.remove('show');document.getElementById('aresult').innerHTML='';document.getElementById('astage').textContent='1단계: 품사 찾기';buildChunks();buildChoices()}function buildChunks(){let w=document.getElementById('chunks');w.innerHTML='';analysisList[ai].chunks.forEach((c,i)=>{let d=document.createElement('div');d.className='chunk'+(i===active?' active':'');d.innerHTML=`<div class="cen">${c[0]}</div><div class="cans" id="ca${i}">?</div>`;d.onclick=()=>{active=i;hi()};w.appendChild(d)})}function hi(){document.querySelectorAll('.chunk').forEach((c,i)=>c.classList.toggle('active',i===active&&!c.classList.contains('done')&&!c.classList.contains('done2')))}function buildChoices(){let g=document.getElementById('choices');g.innerHTML='';(stage===1?posList:roleList).forEach(x=>{let b=document.createElement('button');b.textContent=x;b.onclick=()=>pickA(x);g.appendChild(b)})}function pickA(v){let c=analysisList[ai].chunks[active],cor=stage===1?c[1]:c[2],card=document.querySelectorAll('.chunk')[active];if(v===cor){okS();pop(true);ans[active]=v;document.getElementById('ca'+active).textContent=v;card.classList.remove('active');card.classList.add(stage===1?'done':'done2');let n=ans.indexOf(null);if(n>-1){active=n;hi()}else if(stage===1){let h='';analysisList[ai].chunks.forEach(x=>{if(x[3])h+=`<div class="note"><b>${x[0]}</b><br>${x[3].replace(/\n/g,'<br>')}</div>`});document.getElementById('infod').innerHTML=h||'<div class="note">기본 구조 문장입니다.</div>';document.getElementById('info').classList.add('show');document.getElementById('choices').innerHTML=''}else{document.getElementById('choices').innerHTML='';document.getElementById('aresult').innerHTML='<div class="pattern"><b>분석 완료!</b><br><button class="primary" onclick="nextAnal()">다음 문장</button></div>';recAnal()}}else{ngS();pop(false);card.style.borderColor='var(--red)';setTimeout(()=>card.style.borderColor='#cfe4f8',500)}}function step2(){stage=2;ans.fill(null);active=0;document.getElementById('info').classList.remove('show');document.getElementById('astage').textContent='2단계: 문장 성분';document.querySelectorAll('.chunk').forEach((c,i)=>{c.classList.remove('done','done2','active');if(i===0)c.classList.add('active');document.getElementById('ca'+i).textContent='?'});buildChoices()}function nextAnal(){ai++;if(ai<analysisList.length)loadAnal();else{evo('a',analysisList.length,analysisList.length);document.getElementById('aquiz').style.display='none';document.getElementById('ares').style.display='block';boom()}}function finishAnal(){document.getElementById('aquiz').style.display='none';document.getElementById('ares').style.display='block'}function resetAnal(){document.getElementById('ares').style.display='none';document.getElementById('aintro').style.display='block'}function recAnal(){let h=JSON.parse(localStorage.getItem(STORE+'_anal')||'{}'),k=day();if(!h[k])h[k]={count:0,last:0};h[k].count++;h[k].last=Math.max(h[k].last,ai+1);localStorage.setItem(STORE+'_anal',JSON.stringify(h))}
function renderHist(){let d=document.getElementById('hist');d.innerHTML='<div class="histcat">📝 단어 테스트</div>';let w=JSON.parse(localStorage.getItem(STORE+'_word')||'[]');d.innerHTML+=w.length?w.slice(0,5).map(r=>`<div class="hist">${r.date}<br><b>${r.score}점</b> (${r.correct}/${r.total})</div>`).join(''):'<p>기록 없음</p>';d.innerHTML+='<div class="histcat">🎧 영작</div>';let dh=JSON.parse(localStorage.getItem(STORE+'_dict')||'{}');let ks=Object.keys(dh).sort().reverse();d.innerHTML+=ks.length?ks.map(k=>`<div class="hist">${k}<br><b>${dh[k].last}번까지 완료</b> / 성공 ${dh[k].count}회</div>`).join(''):'<p>기록 없음</p>';d.innerHTML+='<div class="histcat">🧩 분석</div>';let ah=JSON.parse(localStorage.getItem(STORE+'_anal')||'{}');let as=Object.keys(ah).sort().reverse();d.innerHTML+=as.length?as.map(k=>`<div class="hist">${k}<br><b>${ah[k].last}번까지 분석</b></div>`).join(''):'<p>기록 없음</p>'}function renderRev(){let r=document.getElementById('rev'),a=JSON.parse(localStorage.getItem(STORE+'_wrong')||'[]');r.innerHTML=a.length?a.map((w,i)=>`<div class="wrongitem"><div><b>${w.en}</b><br><span>${w.ko}</span></div><button onclick="delWrong(${i})">삭제</button></div>`).join(''):'<div class="ko">오답이 없습니다!</div>'}function delWrong(i){let a=JSON.parse(localStorage.getItem(STORE+'_wrong')||'[]');a.splice(i,1);localStorage.setItem(STORE+'_wrong',JSON.stringify(a));renderRev()}function clearWrong(){localStorage.removeItem(STORE+'_wrong');renderRev()}
</script></body></html>
